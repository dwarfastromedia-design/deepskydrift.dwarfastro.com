<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">DwarfAstro mobile banner</title>
  <desc id="desc">A dark cosmic DwarfAstro banner with gold nebula glow and centered brand lettering.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="47%" r="58%">
      <stop offset="0" stop-color="#ffb45c" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#c45d1f" stop-opacity="0.48"/>
      <stop offset="0.58" stop-color="#28110a" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#030508" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1b8"/>
      <stop offset="0.36" stop-color="#d88b31"/>
      <stop offset="0.7" stop-color="#ffcf73"/>
      <stop offset="1" stop-color="#7b3d16"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="720" height="240" fill="#030508"/>
  <rect width="720" height="240" fill="url(#core)" opacity="0.92"/>
  <g opacity="0.9" filter="url(#soft)">
    <path d="M20 96 C95 44 160 54 235 92 C294 122 363 118 421 82 C510 28 613 56 700 118 L700 240 L20 240 Z" fill="#35150a" opacity="0.9"/>
    <path d="M34 113 C92 62 159 71 230 105 C305 141 364 145 437 102 C519 54 621 77 704 135" fill="none" stroke="#ff7b25" stroke-width="7" opacity="0.42"/>
    <path d="M38 121 C95 85 150 89 220 121 C305 160 382 162 452 120 C529 75 625 94 704 148" fill="none" stroke="#ffcf73" stroke-width="2" opacity="0.66"/>
  </g>
  <g opacity="0.95">
    <circle cx="61" cy="42" r="1.7" fill="#ffe0a2"/>
    <circle cx="118" cy="62" r="1.2" fill="#fff8d9"/>
    <circle cx="184" cy="34" r="1.4" fill="#f7b96b"/>
    <circle cx="238" cy="74" r="1.1" fill="#fff0bf"/>
    <circle cx="506" cy="38" r="1.5" fill="#fff8e8"/>
    <circle cx="625" cy="66" r="1.2" fill="#ffc679"/>
    <circle cx="682" cy="41" r="1.3" fill="#fff0bf"/>
    <circle cx="569" cy="114" r="1.1" fill="#ffffff"/>
    <path d="M589 46 h18 M598 37 v18" stroke="#fff6df" stroke-width="1.4" opacity="0.85"/>
    <path d="M142 120 h13 M148.5 113.5 v13" stroke="#ffc05a" stroke-width="1.3" opacity="0.85"/>
  </g>
  <g transform="translate(360 86)" filter="url(#glow)">
    <circle r="48" fill="#090705" stroke="url(#gold)" stroke-width="3"/>
    <circle r="41" fill="none" stroke="#ffb14f" stroke-width="1" opacity="0.45"/>
    <path d="M-22 17 h40 M-15 17 l8 -27 h21 l7 27 M-5 -10 l-8 -12 M3 -10 l13 -14 M12 -24 h19 M24 -24 l18 -10" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 -31 l28 -10 M51 -43 l8 18 l-27 9 z" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-35 10 c9 -18 24 -23 40 -19" fill="none" stroke="#f0a33d" stroke-width="2" opacity="0.85"/>
  </g>
  <g text-anchor="middle">
    <text x="360" y="165" font-family="Georgia, Times New Roman, serif" font-size="42" letter-spacing="13" fill="url(#gold)" filter="url(#glow)">DWARFASTRO</text>
    <line x1="210" y1="181" x2="510" y2="181" stroke="#ffad45" stroke-width="1" opacity="0.55"/>
    <text x="360" y="208" font-family="Georgia, Times New Roman, serif" font-size="18" letter-spacing="5" fill="#f6d8a3">Backyard Deep Sky, One Photon at a Time</text>
